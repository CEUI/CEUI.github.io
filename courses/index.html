---
layout: default
title: Courses
description: Available courses in Computer Engineering at Universitas Indonesia.
---

<section class="page-hero fade-up">
  <div class="section-label">Courses</div>
</section>

<section class="page-content">
  <div class="course-list">
    {% for course in site.data.courses %}
    {% if course.url %}
    <a href="{{ course.url | relative_url }}" class="course-item fade-up" style="text-decoration:none;">
      <span class="course-code">{{ course.code }}</span>
      <div class="course-info">
        <h3>{{ course.title }}</h3>
        <p>{{ course.description }}</p>
      </div>
      <span style="margin-left:auto; color:var(--accent); font-size:1.1rem; flex-shrink:0;">→</span>
    </a>
    {% endif %}
    {% endfor %}
  </div>
</section>
