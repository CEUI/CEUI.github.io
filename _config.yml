title: CEUI — Computer Engineering
description: Advancing knowledge in computing systems, networks, cybersecurity, and intelligent systems.
url: "https://ceui.github.io"
baseurl: ""

# Build
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-seo-tag
